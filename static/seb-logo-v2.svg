<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" fill="none">
  <defs>
    <!-- Cyan glow gradient used by text + underline -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="50%"  stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <!-- Subtle vertical fill for main text -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#CFF4FF"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Decorative left bracket -->
  <text x="18" y="130" font-family="'IBM Plex Mono','JetBrains Mono','Fira Code',monospace"
        font-size="90" font-weight="300" fill="none"
        stroke="url(#g1)" stroke-width="1.5" opacity="0.5" filter="url(#softglow)">[</text>

  <!-- Main wordmark -->
  <text x="68" y="128"
        font-family="'IBM Plex Mono','JetBrains Mono','Fira Code',monospace"
        font-size="72" font-weight="700" letter-spacing="-1"
        fill="url(#g2)" filter="url(#glow)">seba</text>
  <!-- Dot separator with accent color -->
  <text x="284" y="128"
        font-family="'IBM Plex Mono','JetBrains Mono','Fira Code',monospace"
        font-size="72" font-weight="400"
        fill="#38BDF8" opacity="0.9" filter="url(#glow)">.</text>
  <text x="306" y="128"
        font-family="'IBM Plex Mono','JetBrains Mono','Fira Code',monospace"
        font-size="72" font-weight="700" letter-spacing="-1"
        fill="url(#g2)" filter="url(#glow)">debian</text>

  <!-- Decorative right bracket -->
  <text x="552" y="130" font-family="'IBM Plex Mono','JetBrains Mono','Fira Code',monospace"
        font-size="90" font-weight="300" fill="none"
        stroke="url(#g1)" stroke-width="1.5" opacity="0.5" filter="url(#softglow)">]</text>

  <!-- Hairline underline accent -->
  <line x1="68" y1="142" x2="538" y2="142" stroke="url(#g1)" stroke-width="1" opacity="0.45"/>

  <!-- Subtle tagline -->
  <text x="300" y="166"
        font-family="'IBM Plex Mono','JetBrains Mono','Fira Code',monospace"
        font-size="11" font-weight="400" letter-spacing=".18em"
        fill="#38BDF8" opacity="0.45" text-anchor="middle">HOMELAB AGENT</text>
</svg>
